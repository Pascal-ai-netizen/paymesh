<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PayMesh — Claim Voucher</title>
<meta name="theme-color" content="#070A0E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#070A0E;--bg2:#0F141C;--bg3:#141B25;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.10);
  --em:#2DD882;--em2:#1DB86A;
  --amber:#F0A830;--blue:#5B9CF6;--red:#E8526A;
  --text:#EDF1F7;--text2:#6E849E;--text3:#3A4A5C;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:12px;--r2:18px;--spring:cubic-bezier(0.34,1.56,0.64,1);
}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;
  line-height:1.5;min-height:100svh;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}

/* ── Mobile-only gate ── */
#pm-mobile-gate{
  display:none;position:fixed;inset:0;z-index:9999;
  background:var(--bg);flex-direction:column;align-items:center;
  justify-content:center;gap:20px;padding:40px;text-align:center;
  font-family:var(--sans);
}
#pm-mobile-gate svg{opacity:.7}
#pm-mobile-gate h2{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.4px}
#pm-mobile-gate p{font-size:14px;color:var(--text2);max-width:300px;line-height:1.7}
#pm-mobile-gate .badge{
  margin-top:8px;padding:9px 18px;border:1px solid rgba(232,82,106,.25);
  border-radius:10px;background:rgba(232,82,106,.07);
  font-size:12px;color:var(--red);letter-spacing:.5px;font-weight:600;
}

/* ── App shell ── */
#app{
  max-width:440px;margin:0 auto;padding:20px 16px 40px;
  min-height:100svh;display:flex;flex-direction:column;
}

/* ── Logo bar ── */
.logo-bar{display:flex;align-items:center;gap:10px;margin-bottom:28px;padding-top:12px}
.logo-mark{
  width:34px;height:34px;border-radius:10px;
  background:rgba(45,216,130,.1);border:1px solid rgba(45,216,130,.16);
  display:flex;align-items:center;justify-content:center;
}
.logo-text{font-size:17px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.logo-text span{color:var(--em)}

/* ── Hero card ── */
.hero{
  background:linear-gradient(148deg,rgba(45,216,130,.07),rgba(45,216,130,.02) 60%,rgba(91,156,246,.04));
  border:1px solid rgba(45,216,130,.12);border-radius:22px;
  padding:28px 22px 24px;margin-bottom:14px;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(45,216,130,.4),transparent);
}
.hero-icon{font-size:40px;margin-bottom:14px;display:block}
.hero-title{font-size:26px;font-weight:700;letter-spacing:-.8px;color:var(--text);margin-bottom:6px}
.hero-amount{font-family:var(--mono);font-size:36px;font-weight:500;color:var(--em);letter-spacing:-1px;margin-bottom:8px}
.hero-from{font-size:14px;color:var(--text2);font-weight:400}

/* ── Card ── */
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);
  padding:20px 18px;margin-bottom:12px;
}
.card::before{
  content:'';display:block;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);
  margin:-20px -18px 18px;
}

/* ── Form ── */
.form-group{margin-bottom:16px}
.form-group label{
  display:block;font-size:9.5px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--text3);margin-bottom:8px;
}
.form-group input{
  width:100%;padding:13px 15px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:12px;color:var(--text);
  font:400 16px/1 var(--sans);outline:none;
  transition:border-color .18s,box-shadow .18s;
  caret-color:var(--em);-webkit-appearance:none;
}
.form-group input:focus{
  border-color:rgba(45,216,130,.35);
  background:rgba(45,216,130,.025);
  box-shadow:0 0 0 3px rgba(45,216,130,.08);
}
.form-group input::placeholder{color:var(--text3)}

/* ── OTP dots ── */
.otp-row{display:flex;gap:10px;justify-content:center;margin:12px 0 0}
.otp-digit{
  width:46px;height:54px;border-radius:12px;
  background:var(--bg3);border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font:600 22px/1 var(--mono);color:var(--text);
  transition:border-color .15s,background .15s;
}
.otp-digit.filled{background:rgba(45,216,130,.06);border-color:rgba(45,216,130,.3);color:var(--em)}
.otp-digit.error{border-color:var(--red);background:rgba(232,82,106,.06);color:var(--red);animation:shake .35s ease both}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* ── Keypad ── */
.keypad{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;
}
.key{
  height:54px;border-radius:14px;border:1px solid var(--border);
  background:var(--bg3);font:500 20px/1 var(--mono);color:var(--text);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .12s,transform .12s;-webkit-tap-highlight-color:transparent;
}
.key:active{background:rgba(45,216,130,.09);transform:scale(.94)}
.key.del{font-size:18px;color:var(--text2)}
.key.empty{background:none;border:none;cursor:default}

/* ── Buttons ── */
.btn-primary{
  width:100%;padding:15px;border:none;border-radius:var(--r);
  background:linear-gradient(135deg,#2DD882,#28C876 60%,#1DB86A);
  color:#031A0A;font:600 14px/1 var(--sans);letter-spacing:.2px;
  cursor:pointer;margin-top:4px;
  box-shadow:0 2px 12px rgba(45,216,130,.18);
  transition:transform .15s,box-shadow .2s,opacity .15s;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(45,216,130,.24)}
.btn-primary:active{transform:scale(.97);transition-duration:.06s}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* ── Msg ── */
.msg{margin-top:12px;padding:12px 15px;border-radius:11px;font:500 13px/1.6 var(--sans);display:none}
.msg.success{display:block;background:rgba(45,216,130,.07);border:1px solid rgba(45,216,130,.18);color:var(--em)}
.msg.error  {display:block;background:rgba(232,82,106,.07);border:1px solid rgba(232,82,106,.18);color:var(--red)}

/* ── Notice ── */
.notice{
  padding:12px 14px;border-radius:12px;
  background:rgba(91,156,246,.07);border:1px solid rgba(91,156,246,.16);
  font:400 12.5px/1.7 var(--sans);color:var(--text2);
}
.notice strong{color:var(--text);font-weight:600}

/* ── Loading spinner ── */
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid rgba(255,255,255,.08);
  border-top-color:var(--em);
  animation:spin .7s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Ambient ── */
.ambient{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(45,216,130,.05) 0%,transparent 65%),
             radial-gradient(ellipse 55% 40% at 85% 100%,rgba(91,156,246,.04) 0%,transparent 60%);
}
#app{position:relative;z-index:1}

/* ── Success state ── */
.success-icon{
  width:72px;height:72px;border-radius:50%;
  background:rgba(45,216,130,.1);border:1px solid rgba(45,216,130,.2);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  animation:popIn .5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<!-- Mobile-only gate -->
<div id="pm-mobile-gate">
  <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#E8526A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>
  </svg>
  <h2>Mobile Only</h2>
  <p>PayMesh voucher claims are only available on Android or iOS mobile devices.</p>
  <div class="badge">MOBILE REQUIRED</div>
</div>

<div class="ambient"></div>

<div id="app">
  <!-- Logo -->
  <div class="logo-bar">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
        <path d="M18 4L8 18H16L14 28L24 14H16L18 4Z" fill="url(#cGrad)"/>
        <defs>
          <linearGradient id="cGrad" x1="8" y1="4" x2="24" y2="28" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#2DD882"/>
            <stop offset="100%" stop-color="#1DB86A"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="logo-text">Pay<span>Mesh</span></div>
  </div>

  <!-- Dynamic content injected here -->
  <div id="claim-root">
    <div style="text-align:center;padding:60px 0">
      <div class="spinner"></div>
      <p style="margin-top:20px;color:var(--text3);font-size:13px">Loading voucher…</p>
    </div>
  </div>
</div>

<script type="module">
// ── MOBILE GATE ──
(function() {
  var ua = navigator.userAgent || '';
  var desktopUA = /Windows NT|Macintosh|Linux x86_64|Linux i686|CrOS/.test(ua);
  var isMobileUA = /Android|iPhone|iPad|iPod|Mobile/.test(ua);
  function isDesktop() {
    if (desktopUA && !isMobileUA) return true;
    if (window.matchMedia && window.matchMedia('(pointer:fine)').matches && !window.matchMedia('(pointer:coarse)').matches) return true;
    if (!('ontouchstart' in window) && navigator.maxTouchPoints === 0) return true;
    if (screen.width >= 1024 && navigator.maxTouchPoints === 0) return true;
    if (screen.width >= 1024 && screen.height >= 1024 && !isMobileUA) return true;
    if (/iPad/.test(ua)) return true;
    if (/Android/.test(ua) && !/Mobile/.test(ua) && screen.width >= 768) return true;
    return false;
  }
  var isDesktopResult = isDesktop();
  if (isDesktopResult) {
    var gate = document.getElementById('pm-mobile-gate');
    var app  = document.getElementById('app');
    if (gate) gate.style.display = 'flex';
    if (app)  app.style.display  = 'none';
    return; // stop all JS
  }
})();

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc, getDoc, updateDoc, runTransaction, addDoc, collection
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKs_5eQADpVoFgoRhTJea-SGW0205C9Wc",
  authDomain: "paymesh-7a190.firebaseapp.com",
  projectId: "paymesh-7a190",
  storageBucket: "paymesh-7a190.firebasestorage.app",
  messagingSenderId: "64830673482",
  appId: "1:64830673482:web:5722735cf616109b500cb3"
};
const db = getFirestore(initializeApp(firebaseConfig));

const UPI_REGEX = /^[a-zA-Z0-9.\-_+]+@[a-zA-Z]+$/i;

// Parse token from ?t=
const token = new URLSearchParams(location.search).get('t');
const root  = document.getElementById('claim-root');

function showMsg(el, type, text) {
  el.className = 'msg ' + type;
  el.textContent = text;
}

async function hashOtp(otp, token) {
  const buf  = new TextEncoder().encode(otp + ':paymesh:' + token);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

if (!token) {
  root.innerHTML = `<div class="card" style="text-align:center">
    <p style="color:var(--red);font-weight:600">Invalid voucher link.</p>
    <p style="color:var(--text2);font-size:13px;margin-top:8px">This link appears to be broken or expired.</p>
  </div>`;
} else {
  // Load voucher from Firestore
  (async () => {
    try {
      const vSnap = await getDoc(doc(db,'vouchers',token));
      if (!vSnap.exists()) {
        root.innerHTML = `<div class="card" style="text-align:center">
          <div style="font-size:36px;margin-bottom:12px">❌</div>
          <p style="color:var(--red);font-weight:600;font-size:16px">Voucher not found</p>
          <p style="color:var(--text2);font-size:13px;margin-top:8px;line-height:1.6">This voucher doesn't exist or has already been used.</p>
        </div>`;
        return;
      }
      const v = vSnap.data();
      if (v.status === 'USED' || v.status === 'completed' || v.status === 'needs_payout' || v.status === 'paid') {
        root.innerHTML = `<div class="card" style="text-align:center">
          <div style="font-size:36px;margin-bottom:12px">✅</div>
          <p style="color:var(--em);font-weight:600;font-size:16px">Already Claimed</p>
          <p style="color:var(--text2);font-size:13px;margin-top:8px">This voucher has already been claimed.</p>
        </div>`;
        return;
      }
      if (v.status === 'expired') {
        root.innerHTML = `<div class="card" style="text-align:center">
          <div style="font-size:36px;margin-bottom:12px">⏰</div>
          <p style="color:var(--amber);font-weight:600;font-size:16px">Voucher Expired</p>
          <p style="color:var(--text2);font-size:13px;margin-top:8px">This voucher has expired and the sender has been refunded.</p>
        </div>`;
        return;
      }

      const amount   = Number(v.amount || 0);
      const fromName = v.createdByName || 'Someone';
      let expiryText = '';
      if (v.expiresAt) {
        const diffH = Math.floor((new Date(v.expiresAt) - Date.now()) / 3600000);
        if (diffH > 0) expiryText = `Expires in ~${diffH}h`;
        else expiryText = 'Expiring soon';
      }

      // OTP entry state
      let otpBuffer = '';
      let claimedUpi = '';
      let claimMethod = ''; // 'paymesh' | 'upi'
      let claimedPhone = '';
      let step = 'upi'; // 'upi' | 'otp' | 'done'

      function render() {
        if (step === 'upi') renderUpiStep();
        else if (step === 'otp') renderOtpStep();
      }

      function renderUpiStep() {
        window._claimMethodChosen = ''; // reset on every entry to this step
        root.innerHTML = `
          <div class="hero">
            <span class="hero-icon">🎁</span>
            <div class="hero-title">You've received a voucher!</div>
            <div class="hero-amount">₹${amount.toFixed(2)}</div>
            <div class="hero-from">From <strong style="color:var(--text)">${fromName}</strong>${expiryText ? ' · ' + expiryText : ''}</div>
          </div>
          <div class="card">
            <p style="font-size:13.5px;color:var(--text2);line-height:1.6;margin-bottom:16px">
              How would you like to receive ₹${amount.toFixed(2)}?
            </p>

            <!-- Option A: PayMesh user -->
            <div id="pm-option" style="margin-bottom:12px;border:1.5px solid rgba(45,216,130,.22);border-radius:14px;padding:16px;cursor:pointer;transition:background .15s" onclick="document.getElementById('pm-option').style.background='rgba(45,216,130,.07)';document.getElementById('upi-option').style.background='none';document.getElementById('pm-option').style.borderColor='rgba(45,216,130,.5)';document.getElementById('upi-option').style.borderColor='rgba(255,255,255,.1)';document.getElementById('pm-fields').style.display='block';document.getElementById('upi-fields').style.display='none';window._claimMethodChosen='paymesh';">
              <div style="font-size:13px;font-weight:700;color:var(--em);margin-bottom:4px">✅ I have a PayMesh account</div>
              <div style="font-size:12px;color:var(--text2);line-height:1.5">Enter your phone number — money credited instantly to your PayMesh wallet.</div>
              <div id="pm-fields" style="display:none;margin-top:14px">
                <div class="form-group" style="margin-bottom:0">
                  <label>Your PayMesh Phone Number</label>
                  <input type="tel" id="claim-phone" placeholder="10 digit number" maxlength="10" inputmode="numeric" autocomplete="off" style="font-family:var(--mono);font-size:15px">
                </div>
              </div>
            </div>

            <!-- Option B: No PayMesh -->
            <div id="upi-option" style="margin-bottom:16px;border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:16px;cursor:pointer;transition:background .15s" onclick="document.getElementById('upi-option').style.background='rgba(91,156,246,.07)';document.getElementById('pm-option').style.background='none';document.getElementById('upi-option').style.borderColor='rgba(91,156,246,.4)';document.getElementById('pm-option').style.borderColor='rgba(255,255,255,.1)';document.getElementById('upi-fields').style.display='block';document.getElementById('pm-fields').style.display='none';window._claimMethodChosen='upi';">
              <div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:4px">🏦 I don't have PayMesh — use UPI</div>
              <div style="font-size:12px;color:var(--text2);line-height:1.5">Enter your UPI ID — the admin will manually transfer the money. Takes a few minutes.</div>
              <div id="upi-fields" style="display:none;margin-top:14px">
                <div class="form-group" style="margin-bottom:0">
                  <label>Your UPI ID</label>
                  <input type="text" id="claim-upi" placeholder="yourname@bankname" inputmode="email" autocomplete="off" spellcheck="false" style="font-family:var(--mono);font-size:15px">
                </div>
              </div>
            </div>

            <button type="button" class="btn-primary" id="upi-submit-btn">Continue →</button>
            <div id="upi-msg" class="msg"></div>
          </div>
          <div class="notice">
            <strong>PayMesh users</strong> get instant wallet credit. <strong>Non-PayMesh users</strong> will receive a manual UPI transfer from the admin within minutes.
          </div>`;

        document.getElementById('upi-submit-btn').addEventListener('click', () => {
          const msg = document.getElementById('upi-msg');
          const method = window._claimMethodChosen;
          if (!method) { showMsg(msg,'error','Please choose how you want to receive the money'); return; }

          if (method === 'paymesh') {
            const phone = (document.getElementById('claim-phone').value || '').trim();
            if (!/^\d{10}$/.test(phone)) { showMsg(msg,'error','Enter a valid 10-digit phone number'); return; }
            claimedPhone = phone;
            claimedUpi = '';
            claimMethod = 'paymesh';
            step = 'otp';
            render();
          } else {
            const upi = (document.getElementById('claim-upi').value || '').trim();
            if (!upi) { showMsg(msg,'error','Enter your UPI ID'); return; }
            if (!UPI_REGEX.test(upi)) { showMsg(msg,'error','Invalid UPI ID format. Example: name@upi'); return; }
            claimedUpi = upi;
            claimedPhone = '';
            claimMethod = 'upi';
            step = 'otp';
            render();
          }
        });
      }

      function renderOtpStep() {
        otpBuffer = '';
        root.innerHTML = `
          <div class="hero">
            <span class="hero-icon">🔐</span>
            <div class="hero-title">Enter Secret Code</div>
            <div class="hero-amount">₹${amount.toFixed(2)}</div>
            <div class="hero-from">Ask <strong style="color:var(--text)">${fromName}</strong> for the 6-digit code</div>
          </div>
          <div class="card">
            <p style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6">
              The sender shared a 6-digit secret code with you separately. Enter it below to confirm your claim.
            </p>
            <div class="otp-row" id="otp-dots">
              ${[0,1,2,3,4,5].map(i=>`<div class="otp-digit" id="od${i}"></div>`).join('')}
            </div>
            <div class="keypad">
              ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k =>
                k === '' ? '<div class="key empty"></div>' :
                k === '⌫' ? `<button type="button" class="key del" id="key-del">⌫</button>` :
                `<button type="button" class="key" data-digit="${k}">${k}</button>`
              ).join('')}
            </div>
            <div id="otp-msg" class="msg"></div>
            <button type="button" style="width:100%;margin-top:14px;padding:12px;background:none;border:1px solid var(--border2);border-radius:var(--r);color:var(--text3);font:500 13px/1 var(--sans);cursor:pointer;" id="back-btn">← Go Back</button>
          </div>`;

        document.querySelectorAll('.key[data-digit]').forEach(btn => {
          btn.addEventListener('click', () => pressKey(btn.dataset.digit));
        });
        document.getElementById('key-del').addEventListener('click', () => pressKey('del'));
        document.getElementById('back-btn').addEventListener('click', () => { step = 'upi'; otpBuffer = ''; render(); });
      }

      function pressKey(k) {
        const msg = document.getElementById('otp-msg');
        if (k === 'del') {
          if (otpBuffer.length > 0) { otpBuffer = otpBuffer.slice(0,-1); updateDots(); }
          return;
        }
        if (otpBuffer.length >= 6) return;
        otpBuffer += k;
        updateDots();
        if (otpBuffer.length === 6) setTimeout(() => submitOtp(), 120);
      }

      function updateDots() {
        for (let i=0;i<6;i++) {
          const d = document.getElementById('od'+i);
          if (!d) return;
          d.classList.toggle('filled', i < otpBuffer.length);
          d.classList.remove('error');
          d.textContent = i < otpBuffer.length ? otpBuffer[i] : '';
        }
      }

      async function submitOtp() {
        const msg = document.getElementById('otp-msg');
        if (!msg) return;
        showMsg(msg,'success','Verifying…');
        // disable keys
        document.querySelectorAll('.key').forEach(b => b.disabled = true);

        try {
          const entered = await hashOtp(otpBuffer, token);
          const fresh   = await getDoc(doc(db,'vouchers',token));
          if (!fresh.exists()) { flashError(msg,'Voucher no longer exists.'); return; }
          const vd = fresh.data();

          if (vd.status === 'USED' || vd.status === 'completed' || vd.status === 'needs_payout' || vd.status === 'paid') {
            flashError(msg,'This voucher has already been claimed.'); return;
          }
          if ((vd.codeAttempts || 0) >= 3) {
            flashError(msg,'Too many incorrect attempts. Voucher locked.'); return;
          }
          if (entered !== vd.codeHash) {
            // Increment attempts
            await updateDoc(doc(db,'vouchers',token), { codeAttempts: (vd.codeAttempts||0)+1 });
            const left = 3 - ((vd.codeAttempts||0)+1);
            flashError(msg, left > 0 ? `Wrong code. ${left} attempt${left!==1?'s':''} left.` : 'Too many attempts. Voucher locked.');
            return;
          }

          // ── PAYMESH PATH: auto-credit instantly ──
          if (claimMethod === 'paymesh') {
            // Verify the receiver's phone exists in Firestore
            let receiverName = '';
            try {
              const receiverSnap = await getDoc(doc(db,'users',claimedPhone));
              if (!receiverSnap.exists()) {
                flashError(msg, 'No PayMesh account found for this phone number. Try using your UPI ID instead.');
                return;
              }
              receiverName = receiverSnap.data().name || claimedPhone;
              // Atomic: mark voucher as completed, credit receiver
              await runTransaction(db, async (tx) => {
                const vFresh = await tx.get(doc(db,'vouchers',token));
                const rFresh = await tx.get(doc(db,'users',claimedPhone));
                if (!vFresh.exists() || vFresh.data().status === 'completed' || vFresh.data().status === 'needs_payout' || vFresh.data().status === 'paid') throw new Error('Voucher already redeemed.');
                if (!rFresh.exists()) throw new Error('Receiver account not found.');
                const rBal = rFresh.data().balance || 0;
                const freshAttempts = vFresh.data().codeAttempts || 0;
                tx.update(doc(db,'vouchers',token), {
                  status: 'completed',
                  redeemedBy: claimedPhone,
                  redeemedByName: receiverName,
                  redeemedAt: new Date().toISOString(),
                  claimMethod: 'paymesh',
                  codeAttempts: freshAttempts + 1
                });
                tx.update(doc(db,'users',claimedPhone), { balance: rBal + amount });
              });
              // Write transaction records
              const time = new Date().toISOString();
              await Promise.all([
                addDoc(collection(db,'transactions'), { phone: claimedPhone, label: `Voucher from ${fromName}`, amount, type: 'credit', time }),
                addDoc(collection(db,'transactions'), { phone: vd.createdBy, label: `Voucher redeemed by ${receiverName}`, amount, type: 'debit', time })
              ]);
            } catch(txErr) {
              flashError(msg, txErr.message || 'Could not credit your wallet. Try again.');
              return;
            }

            step = 'done';
            root.innerHTML = `
              <div class="card" style="text-align:center;padding:32px 20px">
                <div class="success-icon">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2DD882" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </div>
                <div style="font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--text);margin-bottom:8px">Money Received! 🎉</div>
                <div style="font-family:var(--mono);font-size:30px;font-weight:500;color:var(--em);letter-spacing:-1px;margin-bottom:12px">+₹${amount.toFixed(2)}</div>
                <p style="font-size:14px;color:var(--text2);line-height:1.7;max-width:280px;margin:0 auto">
                  ₹${amount.toFixed(2)} has been added to your PayMesh wallet (<strong style="color:var(--text);font-family:var(--mono);font-size:13px">${claimedPhone}</strong>) instantly!
                </p>
                <div style="margin-top:20px;padding:12px 14px;background:rgba(45,216,130,.06);border:1px solid rgba(45,216,130,.14);border-radius:12px;font-size:12.5px;color:var(--text2);line-height:1.7">
                  Open PayMesh to see your updated balance.
                </div>
              </div>`;

          } else {
            // ── UPI PATH: mark needs_payout, admin transfers manually ──
            await updateDoc(doc(db,'vouchers',token), {
              status:     'needs_payout',
              claimUpi:   claimedUpi,
              claimedAt:  new Date().toISOString(),
              claimMethod: 'upi',
              codeAttempts: (vd.codeAttempts||0)+1
            });

            step = 'done';
            root.innerHTML = `
              <div class="card" style="text-align:center;padding:32px 20px">
                <div class="success-icon">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2DD882" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </div>
                <div style="font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--text);margin-bottom:8px">Claim Submitted!</div>
                <div style="font-family:var(--mono);font-size:30px;font-weight:500;color:var(--em);letter-spacing:-1px;margin-bottom:12px">₹${amount.toFixed(2)}</div>
                <p style="font-size:14px;color:var(--text2);line-height:1.7;max-width:280px;margin:0 auto">
                  The admin will send ₹${amount.toFixed(2)} to<br>
                  <strong style="color:var(--text);font-family:var(--mono);font-size:13px">${claimedUpi}</strong><br>
                  within a few minutes via UPI.
                </p>
                <div style="margin-top:20px;padding:12px 14px;background:rgba(45,216,130,.06);border:1px solid rgba(45,216,130,.14);border-radius:12px;font-size:12.5px;color:var(--text2);line-height:1.7">
                  You'll receive a standard UPI transfer. Check your GPay / PhonePe / bank app once they mark it as sent.
                </div>
              </div>`;
          }

        } catch(e) {
          flashError(msg, e.message || 'Error. Please try again.');
        }
      }

      function flashError(msg, text) {
        for(let i=0;i<6;i++){
          const d=document.getElementById('od'+i);
          if(d){d.classList.add('filled','error');d.textContent=otpBuffer[i]||''}
        }
        showMsg(msg,'error',text);
        setTimeout(()=>{
          otpBuffer='';updateDots();
          document.querySelectorAll('.key').forEach(b=>b.disabled=false);
          msg.className='msg';msg.textContent='';
        },1800);
      }

      render();
    } catch(e) {
      root.innerHTML = `<div class="card" style="text-align:center">
        <p style="color:var(--red);font-weight:600">Failed to load voucher</p>
        <p style="color:var(--text2);font-size:13px;margin-top:8px">Check your internet connection and try again.</p>
      </div>`;
    }
  })();
}
</script>
</body>
</html>
